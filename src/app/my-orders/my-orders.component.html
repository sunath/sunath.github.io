	<div class="cart-section mt-150 mb-150" *ngFor="let item of details">
		<div class="container">
			<div class="row">
				<div class="col-lg-8 col-md-12">
					<div class="cart-table-wrap" >
                        <h3>Ordered At {{ item.checkOutAt}}</h3>
						<table class="cart-table" >
							<thead class="cart-table-head">
								<tr class="table-head-row">
									<th class="product-image">Product Image</th>
									<th class="product-name">Name</th>
									<th class="product-price">Price</th>
									<th class="product-quantity">Quantity</th>
									<th class="product-total">Total</th>
								</tr>
							</thead>
							<tbody *ngIf="details">
								<tr class="table-body-row" *ngFor="let product of item.productDetails;" >
                                    

									<td class="product-image"><img [src]="product.imageUrl" alt=""></td>
									<td class="product-name">{{ product.name }}</td>
									<td class="product-price">{{ product.price | currency:"USD":true }}</td>
                                    <td class="product-quantity">{{ product.quantity }}</td>
									<td class="product-total">{{ product.price * product.quantity | currency:"USD":true }}</td>
								</tr>
							</tbody>
							<tfoot>
								
							</tfoot>
						</table>
					</div>
				</div>
